- origin_name: UBERON
  origin_id: '0014442'
  origin_version: '1'
  value: superior ischial ramus
  definition: 'The superior ramus of the ischium (descending ramus) projects downward
    and backward from the body and presents for examination three surfaces: external,
    internal, and posterior. The external surface is quadrilateral in shape. It is
    bounded above by a groove which lodges the tendon of the Obturator externus; below,
    it is continuous with the inferior ramus; in front it is limited by the posterior
    margin of the obturator foramen; behind, a prominent margin separates it from
    the posterior surface. In front of this margin the surface gives origin to the
    Quadratus femoris, and anterior to this to some of the fibers of origin of the
    Obturator externus; the lower part of the surface gives origin to part of the
    Adductor magnus. The internal surface forms part of the bony wall of the lesser
    pelvis. In front it is limited by the posterior margin of the obturator foramen.
    Below, it is bounded by a sharp ridge which gives attachment to a falciform prolongation
    of the sacrotuberous ligament, and, more anteriorly, gives origin to the Transversus
    perinC&i and Ischiocavernosus. Posteriorly the ramus forms a large swelling, the
    tuberosity of the ischium.'
  external_references: Wikipedia:Superior_ramus_of_the_ischium|SCTID:292625002|FMA:304318
