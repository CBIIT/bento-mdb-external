  value: trapezius muscle
  definition: 'A large superficial muscle that extends longitudinally from the occipital
    bone to the lower thoracic vertebrae and laterally to the spine of the scapula
    (shoulder blade). Its functions are to move the scapulae and support the arm.
    The trapezius has three functional regions: the superior region (descending part),
    which supports the weight of the arm; the intermediate region (transverse part),
