- origin_name: UBERON
  origin_id: 0006479
  origin_version: '1'
  value: Brodmann (1909) area 38
  definition: Brodmann area 38, also BA38 or temporopolar area 38 (H), is part of
    the temporal cortex in the human brain. BA 38 is at the anterior end of the temporal
    lobe, known as the temporal pole. BA38 is a subdivision of the cytoarchitecturally
    defined temporal region of cerebral cortex. It is located primarily in the most
    rostral portions of the superior temporal gyrus and the middle temporal gyrus.
    Cytoarchitecturally it is bounded caudally by the inferior temporal area 20, the
    middle temporal area 21, the superior temporal area 22 and the ectorhinal area
    36 (Brodmann-1909). Cytoarchitectonic and chemoarchitectonic studies find that
    it contains at least seven subareas, one of which, TG, is unique to humans. 'The
    functional significance of this area TG is not known, but it may bind complex,
    highly processed perceptual inputs to visceral emotional responses.' This area
    is among the earliest affected by Alzheimer's disease and the earliest involved
    at the start of temporal lobe seizures.
  external_references: Wikipedia:Brodmann_area_38|BIRNLEX:1771|SCTID:384793008|FMA:68635|neuronames:2412|UMLS:C1272499
