- origin_name: UBERON
  origin_id: '0006636'
  origin_version: '1'
  value: lumbar artery
  definition: 'The lumbar arteries are in series with the intercostals. They are usually
    four in number on either side, and arise from the back of the aorta, opposite
    the bodies of the upper four lumbar vertebrC&. A fifth pair, small in size, is
    occasionally present: they arise from the middle sacral artery. They run lateralward
    and backward on the bodies of the lumbar vertebrC&, behind the sympathetic trunk,
    to the intervals between the adjacent transverse processes, and are then continued
    into the abdominal wall. The arteries of the right side pass behind the inferior
    vena cava, and the upper two on each side run behind the corresponding crus of
    the diaphragm. The arteries of both sides pass beneath the tendinous arches which
    give origin to the Psoas major, and are then continued behind this muscle and
    the lumbar plexus. They now cross the Quadratus lumborum, the upper three arteries
    running behind, the last usually in front of the muscle. At the lateral border
    of the Quadratus lumborum they pierce the posterior aponeurosis of the Transversus
    abdominis and are carried forward between this muscle and the Obliquus internus.
    They anastomose with the lower intercostal, the subcostal, the iliolumbar, the
    deep iliac circumflex, and the inferior epigastric arteries.'
  external_references: UMLS:C0226408|SCTID:244285007|NCIT:C33013|Wikipedia:Lumbar_arteries|EMAPA:19096|FMA:14735
