    areas 9 - 12, of areas 45, 46, and the superior part of area 47.[2] These regions
    mainly receive their blood supply from the middle cerebral artery. With respect
    to neurotransmitter systems, there is evidence that dopamine plays a particularly
    important role in DL-PFC.[2]DL-PFC is connected to the orbitofrontal cortex, and
    to a variety of brain areas, which include the thalamus, parts of the basal ganglia
    (the dorsal caudate nucleus), the hippocampus, and primary and secondary association
    areas of neocortex, including posterior temporal, parietal, and occipital areas.
