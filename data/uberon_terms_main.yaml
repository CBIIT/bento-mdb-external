  origin_version: '1'
  value: inferior ischial ramus
  definition: 'The Inferior Ramus of the ischium (ascending ramus) is the thin, flattened
    part of the ischium, which ascends from the superior ramus, and joins the inferior
    ramus of the pubisbthe junction being indicated in the adult by a raised line.
    The outer surface is uneven for the origin of the obturator externus and some
    of the fibers of the adductor magnus; its inner surface forms part of the anterior
    wall of the pelvis. Its medial border is thick, rough, slightly everted, forms
    part of the outlet of the pelvis, and presents two ridges and an intervening space.
    The ridges are continuous with similar ones on the inferior ramus of the pubis:
    to the outer is attached the deep layer of the superficial perineal fascia (fascia
    of Colles), and to the inner the inferior fascia of the urogenital diaphragm.
    If these two ridges be traced downward, they will be found to join with each other
    just behind the point of origin of the transversus perinC&i; here the two layers
    of fascia are continuous behind the posterior border of the muscle. To the intervening
    space, just in front of the point of junction of the ridges, the transversus perinC&i
    is attached, and in front of this a portion of the crus penis vel clitoridis and
    the ischiocavernosus. Its lateral border is thin and sharp, and forms part of
    the medial margin of the obturator foramen.'
  external_references: Wikipedia:Inferior_ramus_of_the_ischium|SCTID:361324004
