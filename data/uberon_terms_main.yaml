  value: Brodmann (1909) area 20
  definition: Brodmann area 20, or BA20, is part of the temporal cortex in the human
    brain. The region encompasses most of the ventral temporal cortex, a region believed
    to play a part in high-level visual processing and recognition memory. This area
    is also known as inferior temporal area 20, and it refers to a subdivision of
    the cytoarchitecturally defined temporal region of cerebral cortex. In the human
