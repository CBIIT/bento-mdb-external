    and is invested with a layer of cartilage, which is considerably thicker than
    that on the latter bone. The ligaments of this joint are: Articular capsule Anterior
    sternoclavicular ligament Posterior sternoclavicular ligament Interclavicular
    ligament Costoclavicular ligament Articular disk [WP,unvetted].'
