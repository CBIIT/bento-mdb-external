- origin_name: UBERON
  origin_id: '0002157'
  origin_version: '1'
  value: nucleus raphe pallidus
  definition: The nucleus raphe pallidus receives afferent connections from the periaqueductal
    gray, the paraventricular hypothalamic nucleus, central nucleus of the amygdala,
    lateral hypothalamic area, and parvocellular reticular nucleus. Also, the pallidus
    receives afferents from the medial preoptic area, median preoptic nucleus and
    lateral paragigantocellular reticular nuclei . The pallidus has recently been
    shown to be involved in the activation of a fever as an immunoreaction. It has
    been implied that the preoptic area is constantly inhibiting the raphe pallidus,
    especially the rostral portion, with GABA. When the preoptic area receives immune
    signals from the body, the inhibition stops and the rostral portion of the raphe
    pallidus excites the intermediolateral cell column, which induces a fever . The
    raphe pallidus has also been known to mediate the tachycardia response, an extremely
    high heart rate known to be incited by emotional or psychological stress. Microinjections
    of a GABA-a antagonist into the raphe pallidus, induces an increased heart rate.
    Conversely, microinjections of muscimol, a GABA-a agonist, inhibit tachycardia
    in rats under air-stress stimuli. In both of these cases, GABA is mediating two
    different sympathetic responses, so clearly the nucleus raphe pallidus is a far
    more a complex nucleus than previously thought. [WP,unvetted].
  external_references: Wikipedia:Nucleus_raphe_pallidus|MESH:D065848|FMA:72586|UMLS:C0175517|EMAPA:35722|MA:0001051|MBA:230|BIRNLEX:1375|BAMS:RPA|DHBA:12644|neuronames:741|HBA:9649|BAMS:RPa
