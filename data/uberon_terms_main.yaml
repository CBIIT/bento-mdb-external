- origin_name: UBERON
  origin_id: 0022469
  origin_version: '1'
  value: primary olfactory cortex
  definition: A group of structures defined by connectivity, namely, structures that
    receive axons from the olfactory bulb. They include the anterior olfactory nucleus,
    the anterior perforated substance, the rostral part of the medial amygdaloid nucleus
    (anterior cortical nucleus of amygdala), and structures in the anterior part of
    the parahippocampal gyrus, namely, the prepyriform area, most of the periamygdaloid
    area, and the rostral part of the entorhinal area (Price-90). Note that some authors
    have regarded the olfactory bulb itself as the primary olfactory area and the
