  origin_version: '1'
  value: internal carotid nerve plexus
  definition: The internal carotid plexus (carotid plexus) is situated on the lateral
    side of the internal carotid artery, and in the plexus there occasionally exists
    a small gangliform swelling, the carotid ganglion, on the under surface of the
    artery. Postganglionic sympathetic fibres ascend from the superior cervical ganglion,
    along the walls of the internal carotid artery, to enter the internal carotid
    plexus. These fibres then distribute to deep structures, which include the levator
    palpebrae superioris and pupillary dilator muscles. Some of the fibres from the
    internal carotid plexus converge to form the deep petrosal nerve. The internal
    carotid plexus communicates with the semilunar ganglion, the abducent nerve, and
    the sphenopalatine ganglion; it distributes filaments to the wall of the carotid
    artery, and also communicates with the tympanic branch of the glossopharyngeal
    nerve. [WP,unvetted].
