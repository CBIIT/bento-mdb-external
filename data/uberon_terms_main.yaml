- origin_name: UBERON
  origin_id: 0008245
  origin_version: '1'
  value: pennate muscle
  definition: A pennate muscle (also called a penniform muscle) is a muscle with fascicles
    that attach obliquely (in a slanting position) to its tendon. These types of muscles
    generally allow better stabilization and force production but less flexibility.
    Individual muscle fibers are formed into bundles of fasciculi and these bundles
    of fasciculi are formed into bundles of fascicles which compose the entire muscle
    itself. In a pennate muscle, the fascicles will form an angle with its central
    tendon. If all the fascicles are on the same side of the tendon, the pennate muscle
    is called unipennate. Examples of this include certain muscles in the manus. If
    there are fascicles on both sides of the central tendon, the pennate muscle is
    called bipennate. The rectus femoris, a large muscle in the quadriceps, is typical.
    If the central tendon branches within a pennate muscle, the muscle is called multipennate,
    as seen in the deltoid muscle in the shoulder.
  external_references: Wikipedia:Pennate_muscle|FMA:74993
