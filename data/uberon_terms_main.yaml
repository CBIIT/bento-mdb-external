  value: ileocecal valve
  definition: The ileocecal valve is a sphincter muscle situated at the junction of
    the small intestine (ileum) and the large intestine. Its critical function is
    to limit the reflux of colonic contents into the ileum.
  external_references: galen:IleocecalValve|UMLS:C0020880|FMA:15973|MESH:D007080|NCIT:C13066|SCTID:362153007|Wikipedia:Ileocecal_valve
- origin_name: UBERON
  origin_id: '0011252'
  origin_version: '1'
  value: scent gland
  definition: Scent glands are exocrine glands found in most mammals. They produce
    semi-viscous secretions which contain pheromones and other semiochemical compounds.
    These odor-messengers indicate information such as status, territory marking,
    mood, and sexual power. The odor may be subliminal-not consciously detectable.
    Though it is not their primary function, the salivary glands may also function
    as scent glands in some animals.
  external_references: Wikipedia:Scent_gland|MESH:D012543|BTO:0002068
- origin_name: UBERON
  origin_id: '0006756'
  origin_version: '1'
  value: median lingual swelling
  definition: During the third week of embryological development there appears, immediately
    behind the ventral ends of the two halves of the mandibular arch, a rounded swelling
    named the tuberculum impar, which was described by His as undergoing enlargement
    to form the buccal part of the tongue. More recent researches, however, show that
    this part of the tongue is mainly, if not entirely, developed from a pair of lateral
    swellings which rise from the inner surface of the mandibular arch and meet in
    the middle line. The site of their meeting remains post-embryonically as the median
    sulcus of the tongue. The tuberculum impar is said to form the central part of
    the tongue immediately in front of the foramen cecum, but Hammar insists that
    it is purely a transitory structure and forms no part of the adult tongue[WP,
    Gray's].
  external_references: FMA:312476|EMAPA:17187|VHOG:0000730|SCTID:308821003|Wikipedia:Tuberculum_impar|EHDAA2:0001081
- origin_name: UBERON
  origin_id: '0006634'
  origin_version: '1'
  value: lingual vein
  definition: The lingual veins begin on the dorsum, sides, and under surface of the
    tongue, and, passing backward along the course of the lingual artery, end in the
    internal jugular vein. The vena comitans of the hypoglossal nerve (ranine vein),
    a branch of considerable size, begins below the tip of the tongue, and may join
    the lingual; generally, however, it passes backward on the Hyoglossus, and joins
    the common facial.
  external_references: FMA:14326|EMAPA:19312|AAO:0010514|SCTID:181375007|Wikipedia:Lingual_veins
