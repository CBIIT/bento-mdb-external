  origin_version: '1'
  value: deep fascia
  definition: Deep fascia (or 'investing fascia') is a layer of fascia which can surround
    individual muscles, and divide groups of muscles into compartments. This is the
    dense fibrous connective tissue that interpenetrates and surrounds the muscles,
    bones, nerves and blood vessels of the body. It provides connection and communication
    in the form of aponeuroses, ligaments, tendons, retinacula, joint capsules, and
    septa. The deep fasciae envelop all bone; cartilage, and blood vessels and become
    specialized in muscles and nerves. The high density of collagen fibers is what
    gives the deep fascia its strength and integrity. The amount of elastin fiber
    determines how much extensibility and resilience it will have.
