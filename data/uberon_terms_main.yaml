- origin_name: UBERON
  origin_id: '0001117'
  origin_version: '1'
  value: caudate lobe of liver
  definition: The caudate lobe (posterior hepatic segment I, Spigelian lobe) is situated
    upon the postero-superior surface of the liver on the right lobe of the liver,
    opposite the tenth and eleventh thoracic vertebrae. It is bounded on the left
    side by the physiological division of the liver called the ligamentum venosum.
    It is bounded, below, by the porta; on the right, by the fossa for the inferior
    vena cava; and, on the left, by the fossa for the ductus venosus. It looks backward,
    being nearly vertical in position; it is longer from above downward than from
    side to side, and is somewhat concave in the transverse direction. The caudate
    process is a small elevation of the hepatic substance extending obliquely and
    laterally, from the lower extremity of the caudate lobe to the under surface of
    the right lobe. It is situated behind the porta, and separates the fossa for the
    gall-bladder from the commencement of the fossa for the inferior vena cava. Budd-Chiari
    syndrome, caused by occlusion of hepatic venous outflow, can lead to hypertrophy
    of the caudate lobe due to its own caval anastomosis that allows for continued
    function of this lobe of the liver. [WP,unvetted].
  external_references: EHDAA2:0001005|MA:0000364|EMAPA:18313|EHDAA:6990|Wikipedia:Caudate_lobe_of_liver|VHOG:0000508|UMLS:C0227489|SCTID:362184009|NCIT:C33000|FMA:13365
