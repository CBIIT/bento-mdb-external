- origin_name: UBERON
  origin_id: 0002739
  origin_version: '1'
  value: medial dorsal nucleus of thalamus
  definition: 'The medial dorsal nucleus (or dorsomedial nucleus of thalamus) is a
    large nucleus in the thalamus. It receives inputs from the Pre-Frontal Cortex
    and the Limbic System and in turn relays them to the Pre-Frontal Association Cortex.
    As a result, it plays a crucial role in attention, planning, organization, abstract
    thinking, multi-tasking and active memory. The connections of the medial dorsal
    nucleus have even been used to delineate the prefrontal cortex of the Göttingen
    minipig brain. By stereology the number of brain cells in the region has been
    estimated to around 6.43 million neurons in the adult human brain and 36.3 million
    glial cells, and with the newborn having quite different numbers: around 11.2
    million neurons and 10.6 million glial cells. Lesions of the medial dorsal nucleus
    have been associated with Wernicke''s encephalopathy [WP,unvetted].'
  external_references: GAID:663|BTO:0002453|MESH:D020645|BAMS:MD|EV:0100200|Wikipedia:Medial_dorsal_nucleus|BM:Die-Th-MD|EMAPA:35296|FMA:62156|DHBA:10398|neuronames:312|MA:0000863|SCTID:279149008|HBA:4401|NCIT:C32480|BAMS:MED|MBA:362|BAMS:MTh|UMLS:C0228329|BIRNLEX:1543
