  origin_version: '1'
  value: temporalis fascia
  definition: The temporal fascia covers the Temporalis muscle. It is a strong, fibrous
    investment, covered, laterally, by the Auricularis anterior and superior, by the
    galea aponeurotica, and by part of the Orbicularis oculi. The superficial temporal
    vessels and the auriculotemporal nerve cross it from below upward. Above, it is
    a single layer, attached to the entire extent of the superior temporal line; but
    below, where it is fixed to the zygomatic arch, it consists of two layers, one
    of which is inserted into the lateral, and the other into the medial border of
    the arch. A small quantity of fat, the orbital branch of the superficial temporal
