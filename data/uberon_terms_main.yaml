  origin_version: '1'
  value: mediastinal lymph node
  definition: A lymph node that is part of a mediastinum. Each consists of several
    lymph node groups, especially along the trachea (5 groups), along the esophagus
    and between the lung and the diaphragm. In the mediastinal lymph nodes arises
    lymphatic ducts, which draines the lymph to the left subclavian vein (to the venous
    angle in the confluence of the subclavian and deep jugular veins). The mediastinal
    lymph nodes along the esophagus are in tight connection with the abdominal lymph
    nodes along the esophagus and the stomach. That fact facilitates spreading of
    tumors cells through these lymphatics in cases of cancers of the stomach and particularly
    of the esophagus. Through the mediastinum, the main lymphatic drainage from the
    abdominal organs goes via the thoracic duct (ductus thoracicus), which drains
    majority of the lymph from the abdomen to the above mentioned left venous angle.
  external_references: EFO:0001670|MA:0002877|Wikipedia:Lymph_node#Lymph_nodes_of_the_thorax|NCIT:C33073|UMLS:C0588055|EMAPA:35555|SCTID:181760002|FMA:12774
