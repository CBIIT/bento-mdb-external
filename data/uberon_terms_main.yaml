    of the cytoarchitecturally defined temporal region of cerebral cortex. It is located
    primarily in the caudal portions of the fusiform gyrus and inferior temporal gyrus
    on the mediobasal and lateral surfaces at the caudal extreme of the temporal lobe.
    Cytoarchitecturally it is bounded caudally by the peristriate Brodmann area 19,
    rostrally by the inferior temporal area 20 and middle temporal area 21 and dorsally
    on the lateral aspect of the hemisphere by the angular area 39 (H) (Brodmann-1909).
