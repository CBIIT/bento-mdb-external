  value: superior longitudinal fasciculus
  definition: The superior longitudinal fasciculus (also called the superior longitudinal
    fascicle or SLF) is a pair of long bi-directional bundles of neurons connecting
    the front and the back of the cerebrum. Each association fiber bundle is lateral
    to the centrum ovale of a cerebral hemisphere and connects the frontal, occipital,
    parietal, and temporal lobes. The neurons pass from the frontal lobe through the
    operculum to the posterior end of the lateral sulcus where numerous neurons radiate
    into the occipital lobe and other neurons turn downward and forward around the
    putamen and radiate to anterior portions of the temporal lobe.
