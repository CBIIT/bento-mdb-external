    (front) walls. There is a common set of layers covering and forming all the walls:
    the deepest being the extraperitoneal fat, the parietal peritoneum, and a layer
    of fascia which has different names over where it covers (eg transversalis, psoas
    fascia). Superficial to these, but not present in the posterior wall are the three
    layers of muscle, the transversus abdominis (transverse abdominal muscle), the
    internal (obliquus internus) and the external oblique (obliquus externus).'
