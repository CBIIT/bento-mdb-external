- origin_name: UBERON
  origin_id: '0010507'
  origin_version: '1'
  value: layer of dura mater
  definition: 'The intracranial dura mater, consisting of two layers: the outer periosteal
    layer which normally always adheres to the periosteum of the bones of the cranial
    vault; and the inner meningeal layer which in most places is fused with the outer.
    The two layers separate to accommodate meningeal vessels and large venous (dural)
    sinuses. The meningeal layer is also involved in the formation of the various
    dural folds, such as the falx cerebri and tentorium cerebelli and is comparable
    to and continuous with the dural mater of the spinal cord. The cranial epidural
    space is then a potential space between the bone and the combined periosteum/periosteal
    layer of the dura mater realised only pathologically and is neither continuous
    with or comparable to the vertebral epidural space.'
  external_references: FMA:231545
- origin_name: UBERON
  origin_id: 0005807
  origin_version: '1'
  value: rostral ventrolateral medulla
  definition: Control of blood pressure is crucially dependent on the integrity of
    a small region of the brainstem called the ventrolateral medulla. Within this
    part of the brain are the cells that control the heart, blood vessels, swallowing,
    breathing and many other functions of the body that are not noticed at a conscious
    level; such unconscious activities are known as 'Autonomic'. One of these regions
    is the Rostral Ventrolateral Medulla (RVLM) is also known as the pressor area
    of the medulla (medulla pressor). It receives inhibitory GABAergic input from
    the caudal ventrolateral medulla (CVLM). The RVLM is the primary regulator of
    the sympathetic nervous system, sending excitatory fibers (catecholaminergic)
    to the sympathetic preganglionic neurons in the spinal cord, via reticulospinal
    tract[WP].
  external_references: BTO:0002778|Wikipedia:Rostral_ventrolateral_medulla
