  value: cervical loop
  definition: The cervical loop is the location on an enamel organ in a developing
    tooth where the outer enamel epithelium and the inner enamel epithelium join.
    The cervical loop is a histologic term indicating a specific epithelial structure
    at the apical side of the tooth germ, consisting of loosely aggregated stellate
    reticulum in the center surrounded by stratum intermedium. These tissues are enveloped
    by a basal layer of epithelium known on the outside of the tooth as outer enamel
    epithelium and on the inside as inner enamel epithelium. During root formation
    the inner layers of epithelium disappear and only the basal layers are left creating
    Hertwig's Epithelial Root Sheath (HERS). At this point it is usually referred
    to as HERS instead of the cervical loop to indicate the structural difference[WP].
