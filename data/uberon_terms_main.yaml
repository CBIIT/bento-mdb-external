    excluding the tectum but including the pretectal region (Scalia, 1972); see Swanson
    (2000, pp. 522, 526). Usage of this term is very complex, inconsistent, and illogical;
    see for example Crosby et al. (1962, pp. 221, 260, 262), Carpenter (1976, p. 367
