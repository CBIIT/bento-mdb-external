  origin_version: '1'
  value: supplemental motor cortex
  definition: The supplementary motor area (SMA) is a part of the sensorimotor cerebral
    cortex (perirolandic, i.e. on each side of the Rolando or central sulcus). It
    was included, on purely cytoarchitectonic arguments, in area 6 of Brodmann and
    the Vogts. It is located on the medial face of the hemisphere, just in front of
    primary motor cortex. This is an element that appeared late in evolution, in monkeys,
    linked to the appearance of a true medial pallidum.
  external_references: neuronames:3176|Wikipedia:Supplementary_motor_area|FMA:224858
- origin_name: UBERON
