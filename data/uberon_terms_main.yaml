- origin_name: UBERON
  origin_id: 0001398
  origin_version: '1'
  value: brachial artery
  definition: The brachial artery is the major blood vessel of the (upper) arm. It
    is the continuation of the axillary artery beyond the lower margin of teres major
    muscle. It continues down the ventral surface of the arm until it reaches the
    cubital fossa at the elbow. It then divides into the radial and ulnar arteries
    which run down the forearm. In some individuals, the bifurcation occurs much earlier
    and the ulnar and radial arteries extend through the upper arm. The pulse of the
    brachial artery is palpable on the anterior aspect of the elbow, medial to the
    tendon of the biceps, and, with the use of a stethoscope and sphygmomanometer
    (blood pressure cuff) often used to measure the blood pressure. The brachial artery
    is closely related to the median nerve; in proximal regions, the median nerve
    is immediately lateral to the brachial artery. Distally, the median nerve crosses
    the medial side of the brachial artery and lies anterior to the elbow joint. [WP,unvetted].
  external_references: SCTID:181322008|EFO:0004231|FMA:22689|MA:0001921|MESH:D001916|UMLS:C0006087|Wikipedia:Brachial_artery|GAID:475|galen:BrachialArtery|AAO:0010504|NCIT:C12681
