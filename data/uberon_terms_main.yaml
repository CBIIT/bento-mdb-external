  origin_version: '1'
  value: caudal pontine reticular nucleus
  definition: The caudal pontine reticular nucleus is composed of gigantocellular
    neurons. In rabbits and cats it is exclusively giant cells, however in humans
    there are normally sized cells as well. The pontis caudalis is rostral to the
    gigantocellular nucleus and is located in the caudal pons, as the name would indicate.
    The pontis caudalis has been known to mediate head movement, in concert with the
    nucleus gigantocellularis and the superior colliculus. The neurons in the dorsal
    half of this nuclei fire rhythmically during mastication, and in an anesthetized
    animal it is possible to induce mastication via electrical stimulation of the
    PC or adjacent areas of the gigantocellular nucleus. The pontis caudalis is also
    thought to play a role in the grinding of teeth during sleep.
