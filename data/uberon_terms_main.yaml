- origin_name: UBERON
  origin_id: '0005751'
  origin_version: '1'
  value: glomerular visceral epithelium
  definition: The inner (visceral) layer of the renal glomerular capsule, overlying
    the capillaries, composed of podocytes, and separated from the outer (parietal)
    layer by the capsular (Bowman's) space[BTO]. This epithelial layer is superficially
    adjacent to the thickened glomerular basement membrane and is made of podocytes.
    Beneath the visceral layer lie the glomerular capillaries[WP]. This inner epithelial
    layer of the glomerular capsule surrounds the capillary endothelial cells and
    is composed of highly specialized epithelial cells (podocytes) that are separated
    by filtration slits; the inner visceral layer is separated from the outer parietal
    layer by the urinary space (also known as the Bowman's or capsular space)[MP].
  external_references: UMLS:C0227644|SCTID:244093000|NCIT:C33879|MA:0002607|FMA:74273|EMAPA:28254
