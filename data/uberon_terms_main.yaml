- origin_name: UBERON
  origin_id: 0006484
  origin_version: '1'
  value: Brodmann (1909) area 47
  definition: Brodmann area 47, or BA47, is part of the frontal cortex in the human
    brain. Curving from the lateral surface of the frontal lobe into the ventral (orbital)
    frontal cortex. It is below areas BA10 and BA45, and beside BA11. This area is
    also known as orbital area 47. In the human, on the orbital surface it surrounds
    the caudal portion of the orbital sulcus (H) from which it extends laterally into
    the orbital part of inferior frontal gyrus (H). Cytoarchitectonically it is bounded
    caudally by the triangular area 45, medially by the prefrontal area 11 of Brodmann-1909,
    and rostrally by the frontopolar area 10 (Brodmann-1909). It incorporates the
    region that Brodmann identified as 'Area 12' in the monkey, and therefore, following
    the suggestion of Michael Petrides, some contemporary neuroscientists refer to
    the region as 'BA47/12. ' BA47 has been implicated in the processing of syntax
    in spoken and signed languages, and more recently in musical syntax.
  external_references: neuronames:2404|Wikipedia:Brodmann_area_47|SCTID:384807009|FMA:68644|UMLS:C1272513|BIRNLEX:1779
