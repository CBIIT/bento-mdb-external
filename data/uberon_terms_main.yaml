  value: salpingopharyngeus muscle
  definition: The salpingopharyngeus muscle arises from the inferior part of the cartilage
    of the pharyngotympanic tube (Eustachian tube) in the nasal cavity; it passes
    downward and blends with the posterior fasciculus of the palatopharyngeus muscle.
    The salpingopharyngeus is known to raise the pharynx and larynx during deglutition
    (swallowing) and laterally draws the pharyngeal walls up. In addition, it opens
    the pharyngeal orifice of the pharyngotympanic tube during swallowing. This allows
    for the equalization of pressure between the auditory canal and the pharynx. The
    salpingopharyngeus is innervated by the vagus nerve (CN X) via the pharyngeal
    plexus.
