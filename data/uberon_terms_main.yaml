- origin_name: UBERON
  origin_id: '0003062'
  origin_version: '1'
  value: primitive knot
  definition: Organizer for gastrulation in vertebrates. The primitive knot starts
    as a regional knot of cells that forms on the blastodisc immediately anterior
    to where the outer layer of cells will begin to migrate inwards - an area known
    as the primitive streak. Posterior to the node is the primitive pit, where the
    cells of the epiblast (the upper layer of embryonic cells) initially begin to
    invaginate. This invagination expands posteriorly into the primitive groove as
    the cells layers continue to move into the space between the embryonic cells and
    the yolk. This differentiates the embryo into the germ layers - endoderm, mesoderm,
    and ectoderm. The primitive knot migrates posteriorly as gastrulation proceeds,
    eventually being absorbed into the tail bud.[WP]. the regional thickening of cells
    at the rostral tip of the vertebrate primitive streak through which gastrulating
    cells migrate anteriorally to form tissues in the future head and neck; this region
    organizes the formation of the three embryonic layers and establishes the longitudinal
    axis and the polarity of the embryo[MP].
  external_references: AAO:0000346|EHDAA:549|EHDAA2:0001272|Wikipedia:Regional_specification#Dorsal.2Fventral_axis_.26_organizer|UMLS:C1283999|FMA:293116|GAID:1312|VHOG:0000598|BTO:0003395|TAO:0000071|MESH:D020897|NCIT:C34266|SCTID:361464001|XAO:0000072|ZFA:0000071|BILA:0000053|EMAPA:16075
