  origin_version: '1'
  value: brachiocephalic muscle
  definition: The brachiocephalicus is a long and flat, complex of muscles that extends
    from the lower half of the humeral shaft to the head and neck. The muscle divides
    into two parts at the clavicular intersection. This is also the point of origin
    for all the muscles that make up the brachiocephalicus. This point is situated
    just cranial to the shoulder. The two main sections are the cleidobrachialis which
    is distal to the clavicular intersection and the cleidocephalicus which extends
    proximally to the clavivular intersection. The cleidocephalicus can also be divided
    into the pars cervicalis, which inserts on the broad aponeurosis, over the fibrous
    raphe of the cranial half of the neck. The other part, the pars mastoideus inserts
    on the mastoid process of the temporal bone via a strong tendon. The cleidobrachialis
    extends distally from the clavicular intersection and inserts on the cranial edge
    of the distal half of the humerus. The tendon that inserts the cleidobrachialis
    lies between the brachialis muscle and the biceps brachii. As a result of the
    brachiocephalicus spanning a large region it has the ability to provide a number
    of actions. These include extending the shoulder joint, protracts the limb, provides
    lateral movement of the head and allows the neck to be depressed.
  external_references: EMAPA:37685
- origin_name: UBERON
  origin_id: '0002142'
  origin_version: '1'
  value: pedunculopontine tegmental nucleus
  definition: The pedunculopontine nucleus (PPN) (or pedunculopontine tegmental nucleus,
    PPTN) is located in the brainstem, caudal to the substantia nigra and adjacent
    to the superior cerebellar peduncle. It is composed by a wide variety of neurochemical
    cell types, including cholinergic, glutamatergic and GABAergic cells. In the classical
    sense, the PPN is considered to be one of the main components of the reticular
    activating system. [WP,unvetted].
  external_references: EMAPA:35672|Wikipedia:Pedunculopontine_tegmental_nucleus|DMBA:16965|BM:Pons-PPT|neuronames:504|MBA:1052|MESH:D045042|MA:0001020|BAMS:PPN|BIRNLEX:1437|UMLS:C0262306|FMA:72429|DHBA:12413|BAMS:PPTg|HBA:9021
