  origin_version: '1'
  value: supraspinatus muscle
  definition: The supraspinatus is a relatively small muscle of the upper limb that
    takes its name from its origin from the supraspinous fossa superior to the spine
    of the scapula. It is one of the four rotator cuff muscles and also abducts the
    arm at the shoulder. The spine of the scapula separates the supraspinatus muscle
    from the infraspinatus muscle, which originates below the spine. [WP,unvetted].
  external_references: UMLS:C0584869|MA:0002389|EMAPA:18182|EHDAA2:0001967|NCIT:C33709|Wikipedia:Supraspinatus_muscle|FMA:9629|SCTID:181626001|EHDAA:8319|VHOG:0000848
