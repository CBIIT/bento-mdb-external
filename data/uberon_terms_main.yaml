- origin_name: UBERON
  origin_id: '0013217'
  origin_version: '1'
  value: zygomatic plate
  definition: In rodent anatomy, the zygomatic plate is a bony plate derived from
    the flattened front part of the zygomatic arch (cheekbone). At the back, it connects
    to the front (maxillary) root of the zygomatic arch, and at the top it is connected
    to the rest of the skull via the antorbital bridge. It is part of the maxillary
    bone, or upper jaw, which also contains the upper cheekteeth. Primitively, rodents
    have a nearly horizontal zygomatic plate. In association with specializations
