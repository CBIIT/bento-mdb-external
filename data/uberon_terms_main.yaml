    plexus, primarily by the vagus nerve (CN X). The levator veli palatini (Levator
    palati) is a thick, rounded muscle situated lateral to the choanC&. It arises
    from the under surface of the apex of the petrous part of the temporal bone and
    from the medial lamina of the cartilage of the auditory tube. After passing above
    the upper concave margin of the Constrictor pharyngis superior it spreads out
