- origin_name: UBERON
  origin_id: '0002070'
  origin_version: '1'
  value: superior pancreaticoduodenal artery
  definition: 'The superior pancreaticoduodenal artery is an artery that supplies
    blood to the duodenum and pancreas. It is a branch of the gastroduodenal artery,
    which comes from the common hepatic artery of the celiac trunk. The common hepatic
    itself becomes the proper hepatic after giving off the gastroduodenal artery and
    goes on to supply the right and left lobes of the liver. The term superior distinguishes
    the superior pancreaticoduodenal artery from the inferior pancreaticoduodenal
    artery, which a branch of the superior mesenteric artery. These arteries, together
    with the pancreatic branches of the splenic artery, form connections or anastomoses
    with one another, allowing blood to perfuse the pancreas and duodenum through
    multiple channels. The artery splits into two branches: the anterior superior
    pancreaticoduodenal artery supplies the anterior margins of the duodenum and pancreas
    the posterior superior pancreaticoduodenal artery supplies the posterior margins
    of these organs [WP,unvetted].'
  external_references: UMLS:C0226317|EMAPA:37121|FMA:70437|SCTID:244272009|Wikipedia:Superior_pancreaticoduodenal_artery|MA:0002015|NCIT:C52742
