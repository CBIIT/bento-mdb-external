- origin_name: UBERON
  origin_id: '0013573'
  origin_version: '1'
  value: Brodmann (1909) area 40
  definition: Brodmann area 40, or BA40, is part of the parietal cortex in the human
    brain. The inferior part of BA40 is in the area of the supramarginal gyrus, which
    lies at the posterior end of the lateral fissure, in the inferior lateral part
    of the parietal lobe. It is bounded approximately by the intraparietal sulcus,
    the inferior postcentral sulcus, the posterior subcentral sulcus and the lateral
    sulcus. Cytoarchitecturally it is bounded caudally by the angular area 39 (H),
    rostrally and dorsally by the caudal postcentral area 2, and ventrally by the
    subcentral area 43 and the superior temporal area 22 (Brodmann-1909). Cytoarchitectonically
    defined subregions of rostral BA40/the supramarginal gyrus are PF, PFcm, PFm,
    PFop, and PFt. Area PF is the homologue to macaque area PF, part of the mirror
    neuron system, and active in humans during imitation. The supramarginal gyrus
    part of Brodmann area 40 is the region in the inferior parietal lobe that is involved
    in reading both in regards to meaning and phonology. [WP,unvetted].
  external_references: BIRNLEX:1773|Wikipedia:Supramarginal_gyrus|neuronames:2408|FMA:68637|UMLS:C1272501
