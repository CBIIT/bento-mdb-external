    and run forward between the metatarsal bones and in contact with the Interossei.
    Each divides into a pair of plantar digital arteries which supply the adjacent
    sides of the toes. Near their points of division each sends upward an anterior
    perforating branch to join the corresponding dorsal metatarsal artery. The first
    plantar metatarsal artery (arteria princeps hallucis) springs from the junction
    between the lateral plantar and deep plantar arteries and sends a digital branch
    to the medial side of the first toe. The digital branch for the lateral side of
    the fifth toe arise from the lateral plantar artery near the base of the fifth
    metatarsal bone.
