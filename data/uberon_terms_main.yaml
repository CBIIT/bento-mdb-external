- origin_name: UBERON
  origin_id: '0013554'
  origin_version: '1'
  value: Brodmann (1909) area 23
  definition: 'The term area 23 of Brodmann-1909 refers to a subdivision of the cerebral
    cortex of the guenon defined on the basis of cytoarchitecture. Brodmann regarded
    it as topographically and cytoarchitecturally homologous to the combined ventral
    posterior cingulate area 23 and dorsal posterior cingulate area 31 of the human
    (Brodmann-1909). Distinctive Features (Brodmann-1905): the cortex is relatively
    thin; smaller cells predominate; the cell density of the multiform layer (VI)
    is great, producing a distinct boundary with the subcortical white matter; the
    internal granular layer (IV) is rather well developed; the internal pyramidal
    layer (V) contains a dense population of round, medium-sized ganglion cells concentrated
    at the border with layer IV; layers V and VI are narrow with a distinct mutual
    boundary.nn* Definition Source NeuroNames.'
  external_references: neuronames:1018|UMLS:C1272541|BIRNLEX:1754|Wikipedia:Brodmann_area_23|FMA:68620
