    upper portion of the vagina; in the male, they are lost. These ducts are made
    of tissue of mesodermal origin[WP]. develops either by lengthwise splitting of
    the archinephric duct (in chondrichthyans and some amphibians) or by a elongated
    invagination of the coelomic epithelium (other vertebrates) In males, the oviducts
    regress. The cranial end of the oviduct maintains an opening into the coelom (which
    primitively may have been the anteriormost coelomic funnels connecting the nephrocoel
    with the coelom). This opening is the ostium tubae[USM].
