- origin_name: UBERON
  origin_id: '0003722'
  origin_version: '1'
  value: middle cranial fossa
  definition: The compartment containing the anterior extremities and half the inferior
    surface of the temporal lobes (TEMPORAL LOBE) of the cerebral hemispheres. Lying
    posterior and inferior to the anterior cranial fossa (CRANIAL FOSSA, ANTERIOR),
    it is formed by part of the TEMPORAL BONE and SPHENOID BONE. It is separated from
    the posterior cranial fossa (CRANIAL FOSSA, POSTERIOR) by crests formed by the
    superior borders of the petrous parts of the temporal bones[MESH]. The middle
    fossa, deeper than the anterior cranial fossa, is narrow medially and widens laterally
    to the sides of the skull. It is separated from the posterior fossa by the clivus
    and the petrous crest. It is bounded in front by the posterior margins of the
    lesser wings of the sphenoid bone, the anterior clinoid processes, and the ridge
    forming the anterior margin of the chiasmatic groove; behind, by the superior
    angles of the petrous portions of the temporal bones and the dorsum sellC&; laterally
    by the temporal squamC&, sphenoidal angles of the parietals, and greater wings
    of the sphenoid. It is traversed by the squamosal, sphenoparietal, sphenosquamosal,
    and sphenopetrosal sutures[WP].
  external_references: GAID:84|NCIT:C33117|MESH:D035301|Wikipedia:Middle_cranial_fossa|FMA:54369|UMLS:C0230045
