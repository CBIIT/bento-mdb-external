- origin_name: UBERON
  origin_id: 0011187
  origin_version: '1'
  value: ventral tubercle of humerus
  definition: The greater tubercle of the humerus is situated lateral to the head
    of the humerus and posteriolateral to the lesser tubercle. Its upper surface is
    rounded and marked by three flat impressions. the highest of these gives ('superior
    facet') insertion to the Supraspinatus the middle ('middle facet') to the Infraspinatus.
    the lowest one ('inferior facet'), and the body of the bone for about 2.5 cm.
    below it, to the Teres minor. The lateral surface of the greater tubercle is convex,
    rough, and continuous with the lateral surface of the body. Between the greater
    tubercle and the lesser tubercle is the intertubercular sulcus (bicipital groove).
  external_references: SCTID:181934009|UMLS:C1512275|NCIT:C32700|FMA:23390|Wikipedia:Greater_tubercle
