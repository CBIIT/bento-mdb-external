- origin_name: UBERON
  origin_id: '0013547'
  origin_version: '1'
  value: Brodmann (1909) area 16
  definition: Brodmann area 16 is a subdivision of the cerebral cortex of the guenon
    defined on the basis of cytoarchitecture. It is a relatively undifferentiated
    cortical area that Brodmann regarded as part of the insula because of the relation
    of its innermost multiform layer (VI) with the claustrum (VICl). The laminar organization
    of cortex is almost totally lacking. The molecular layer (I) is wide as in area
    15 of Brodmann-1905. The space between layer I and layer VI is composed of a mixture
    of pyramidal cells and spindle cells with no significant number of granule cells.
    Pyramidal cells clump in the outer part to form glomeruli similar to those seen
    in some of the primary olfactory areas (Brodmann-1905). This term also refers
    to an area known as peripaleocortical claustral - a cytoarchitecturally defined
    (agranular) portion of the insula at its rostral extreme where it approaches most
    closely the claustrum and the prepyriform area (Stephan-76).
  external_references: neuronames:1011|BIRNLEX:1747|Wikipedia:Brodmann_area_16|FMA:68613
