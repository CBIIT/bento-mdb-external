- origin_name: UBERON
  origin_id: 0009984
  origin_version: '1'
  value: medial condyle of femur
  definition: The medial condyle is one of the two projections on the lower extremity
    of femur. The medial condyle is larger than the lateral (outer) condyle due to
    more weight bearing caused by the center of gravity being medial to the knee.
    On the posterior surface of the condyle the linea aspera (a ridge running down
    the posterior shaft of the femur) turns into the medial supracondylar ridge. The
    outermost protrusion on the medial surface of the medial condyle is referred to
    as the 'medial epicondyle' and can be palpated by running fingers medially from
    the patella with the knee in flexion.
  external_references: FMA:32858|Wikipedia:Medial_condyle_of_femur|SCTID:182056007
