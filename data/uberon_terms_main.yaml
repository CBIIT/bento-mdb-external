  origin_version: '1'
  value: basioccipital bone
  definition: One of the bones of the occiput, the part of the skull which articulates
    with the spine. The basioccipital is located (if present) ventral to the foramen
    magnum. It often rests on or articulates with the basisphenoid, as well as meeting
    the exoccipitals. The basioccipital usually forms most (sometimes all) of the
    occipital condyle(s) and the ventral margin of the foramen magnum.
  external_references: Wikipedia:Basilar_part_of_occipital_bone|SCTID:138976007|EMAPA:18705|MA:0001462|ZFA:0000472|MFMO:0000045|TAO:0000472|VHOG:0001152|AAO:0000039|FMA:52858
- origin_name: UBERON
  origin_id: 0005485
  origin_version: '1'
  value: valve of inferior vena cava
  definition: The semicircular fold of endocardium located on the right atrium at
    the point of attachment of the inferior vena cava; during development this valve
    helps direct the flow of oxygen-rich blood through the right atrium into the left
    cardiac atrium via the foramen ovale (preventing blood flowing into the right
    ventricle).
  external_references: SCTID:277722006|NCIT:C32544|EHDAA2:0002166|UMLS:C0225848|FMA:9240|EHDAA:8631|Wikipedia:Valve_of_inferior_vena_cava
- origin_name: UBERON
  origin_id: '0011634'
  origin_version: '1'
  value: ectopterygoid bone
  definition: A palatal bone which -- like many palatal bones -- may originally have
    developed as a dermal bone replacing part of the palatoquadrate, the primitive
    upper jaw. Like the palatine (also called dermopalatine), the ectopterygoid replaces
    the middle part of the autopalatine. It may be serially homologous with the palatine(s),
    but is somewhat specialized, being the last (most posterior in palatal view) of
    the series and bordering the fossa for the jaw muscles. In a typical tetrapod
    it abuts the palatine anteriorly, the maxilla laterally, the pterygoid or the
    fossa mandubuaris medially, and the fossa posteriorly.
  external_references: ZFA:0000656|EFO:0003552|TAO:0000656
- origin_name: UBERON
