- origin_name: UBERON
  origin_id: '0002005'
  origin_version: '1'
  value: enteric nervous system
  definition: The enteric nervous system is composed of two ganglionated neural plexuses
    in the gut wall which form one of the three major divisions of the autonomic nervous
    system. The enteric nervous system innervates the gastrointestinal tract, the
    pancreas, and the gall bladder. It contains sensory neurons, interneurons, and
    motor neurons. Thus the circuitry can autonomously sense the tension and the chemical
    environment in the gut and regulate blood vessel tone, motility, secretions, and
    fluid transport. The system is itself governed by the central nervous system and
    receives both parasympathetic and sympathetic innervation[GO].
  external_references: MESH:D017615|CALOHA:TS-2093|EHDAA2:0004202|Wikipedia:Enteric_nervous_system|FMA:66070|MIAA:0000102|BIRNLEX:1166|MAT:0000102|BAMS:ENS|MA:0000222|TAO:0001155|EFO:0000895|GAID:799|ZFA:0001155|EMAPA:26922|BTO:0002506|UMLS:C0206111
