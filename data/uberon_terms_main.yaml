    growth and differentiation that are characterized by cleavage, the laying down
    of fundamental tissues, and the formation of primitive organs and organ systems.
    For example, for mammals, the process would begin with zygote formation and end
    with birth. For insects, the process would begin at zygote formation and end with
    larval hatching. For plant zygotic embryos, this would be from zygote formation
