    together and enclosed in membranous sheaths. A small bundle of fibers, enclosed
    in a tubular sheath, is called a funiculus; if the nerve is of small size, it
    may consist only of a single funiculus; but if large, the funiculi are collected
    together into larger bundles or fasciculi, which are bound together in a common
    membranous investment. Examples include: Anterior funiculus of the spinal cord
