  value: internal cerebral vein
  definition: The internal cerebral veins (veins of Galen; deep cerebral veins) drain
    the deep parts of the hemisphere and are two in number; each is formed near the
    interventricular foramen by the union of the terminal and choroid veins. They
    run backward parallel with one another, between the layers of the tela chorioidea
    of the third ventricle, and beneath the splenium of the corpus callosum, where
    they unite to form a short trunk, the great cerebral vein; just before their union
    each receives the corresponding basal vein.
