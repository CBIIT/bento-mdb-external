- origin_name: UBERON
  origin_id: '0001514'
  origin_version: '1'
  value: descending aorta
  definition: The descending aorta is the portion of the aorta in a two-pass circulatory
    system from the arch of aorta to the point where it divides into the common iliac
    arteries[GO]. The descending aorta is part of the aorta, the largest artery in
    the body. The descending aorta is the part of the aorta beginning at the aortic
    arch that runs down through the chest and abdomen. The descending aorta is divided
    into two portions, the thoracic and abdominal, in correspondence with the two
    great cavities of the trunk in which it is situated. Within the abdomen, the descending
    aorta branches into the two common iliac arteries which serve the legs. [WP,unvetted].
  external_references: NCIT:C32455|SCTID:261399002|Wikipedia:Descending_aorta|MA:0002571|EMAPA:18606|UMLS:C0011666|FMA:3784
