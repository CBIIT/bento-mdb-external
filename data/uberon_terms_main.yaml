- origin_name: UBERON
  origin_id: '0013223'
  origin_version: '1'
  value: alveolar gland
  definition: In contrast to tubular glands, in the second main variety of gland,
    the secretory portion is enlarged and the lumen variously increased in size. These
    are termed alveolar glands (or saccular glands, or acinar glands, or acinous glands).
    Some sources draw a clear distinction between acinar and alveolar glands, based
    upon the shape of the lumen. A further complication in the case of the alveolar
    glands may occur in the form of still smaller saccular diverticuli growing out
    from the main sacculi. These are termed alveoli. The term 'tubulo-alveolar' (or
    'tubulo-acinar', or 'compound tubulo-acinar', or 'compound tubulo-alveolar') is
    used to describe glands that start out as branched tubular, and branch further
    to terminate in alveoli. This type of gland is found in the salivary glands, esophagus,
    and mammary glands. The term 'racemose gland' is used to describe a 'compound
    alveolar gland' or 'compound acinar gland'.
  external_references: Wikipedia:Alveolar_gland
