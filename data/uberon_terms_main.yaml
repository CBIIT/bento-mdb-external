- origin_name: UBERON
  origin_id: '0006661'
  origin_version: '1'
  value: epicranial aponeurosis
  definition: 'The galea aponeurotica (epicranial aponeurosis, aponeurosis epicranialis)
    is a tough layer of dense fibrous tissue which covers the upper part of the cranium;
    behind, it is attached, in the interval between its union with the Occipitales,
    to the external occipital protuberance and highest nuchal lines of the occipital
    bone; in front, it forms a short and narrow prolongation between its union with
    the Frontales. On either side it gives origin to the Auriculares anterior and
    superior; in this situation it loses its aponeurotic character, and is continued
    over the temporal fascia to the zygomatic arch as a layer of laminated areolar
    tissue. It is closely connected to the integument by the firm, dense, fibro-fatty
    layer which forms the superficial fascia of the scalp: it is attached to the pericranium
    by loose cellular tissue, which allows the aponeurosis, carrying with it the integument
    to move through a considerable distance.'
  external_references: EMAPA:19210|FMA:46768|Wikipedia:Galea_aponeurotica|SCTID:368677009
