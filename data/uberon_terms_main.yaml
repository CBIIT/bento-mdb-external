- origin_name: UBERON
  origin_id: '0001406'
  origin_version: '1'
  value: ulnar artery
  definition: The ulnar artery is the main blood vessel, with oxygenated blood, of
    the medial aspect of the forearm. It arises from the brachial artery and terminates
    in the superficial palmar arch, which joins with the superficial branch of the
    radial artery. It is palpable on the anterior and medial aspect of the wrist.
    Along its course, it is accompanied by a similarly named vein or veins, the ulnar
    vein or ulnar veins. The ulnar artery, the larger of the two terminal branches
    of the brachial, begins a little below the bend of the elbow in the cubital fossa,
    and, passing obliquely downward, reaches the ulnar side of the forearm at a point
    about midway between the elbow and the wrist. It then runs along the ulnar border
    to the wrist, crosses the transverse carpal ligament on the radial side of the
    pisiform bone, and immediately beyond this bone divides into two branches, which
    enter into the formation of the superficial and deep volar arches. [WP,unvetted].
  external_references: MESH:D017535|MA:0002069|UMLS:C0162858|Wikipedia:Ulnar_artery|NCIT:C12839|galen:UlnarArtery|SCTID:181333006|EMAPA:37675|GAID:515|FMA:22796
