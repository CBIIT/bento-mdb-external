  origin_version: '1'
  value: posterior commissure
  definition: Rounded band of white fibers crossing the middle line on the dorsal
    aspect of the upper end of the cerebral aqueduct. It is important in the bilateral
    pupillary light reflex. Its fibers acquire their medullary sheaths early, but
    their connections have not been definitely determined. Most of them have their
    origin in a nucleus, the nucleus of the posterior commissure (nucleus of Darkschewitsch),
    which lies in the central gray substance of the upper end of the cerebral aqueduct,
    in front of the nucleus of the oculomotor nerve. Some are probably derived from
    the posterior part of the thalamus and from the superior colliculus, whereas others
    are believed to be continued downward into the medial longitudinal fasciculus.
    The posterior commissure interconnects the pretectal nuclei, mediating the consensual
    pupillary light reflex[WP]. Diencephalic tract which is located in the vicinity
    of the dorsal diencephalon and mesencephalon and connects the pretectal nuclei.
    From Neuroanatomy of the Zebrafish Brain[ZFA].
