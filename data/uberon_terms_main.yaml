- origin_name: UBERON
  origin_id: '0003727'
  origin_version: '1'
  value: intercostal nerve
  definition: The intercostal nerves are the anterior divisions (rami anteriores;
    ventral divisions) of the thoracic spinal nerves from T1 to T11. Each nerve is
    connected with the adjoining ganglion of the sympathetic trunk by a gray and a
    white ramus communicans. The intercostal nerves are distributed chiefly to the
    thoracic pleura and abdominal peritoneum and differ from the anterior divisions
    of the other spinal nerves in that each pursues an independent course without
    plexus formation. The first two nerves supply fibers to the upper limb in addition
    to their thoracic branches; the next four are limited in their distribution to
    the parietes of the thorax; the lower five supply the parietes of the thorax and
    abdomen. The 7th intercostal nerve terminates at the xyphoid process, at the lower
    end of the sternum. The 10th intercostal nerve terminates at the umbilicus. The
    twelfth thoracic is distributed to the abdominal wall and groin. [WP,unvetted].
  external_references: SCTID:279568001|MESH:D007367|GAID:858|UMLS:C1285089|Wikipedia:Intercostal_nerves|FMA:6028|EMAPA:18227|NCIT:C32825
