  value: inferior branch of oculomotor nerve
  definition: The inferior branch of the oculomotor nerve or the inferior division,
    the larger, divides into three branches. One passes beneath the optic nerve to
    the medial rectus. Another, to the inferior rectus. The third and longest runs
    forward between the inferior recti and lateralis to the inferior oblique. From
    the last a short thick branch is given off to the lower part of the ciliary ganglion,
    and forms its short root. All these branches enter the muscles on their ocular
    surfaces, with the exception of the nerve to the inferior oblique, which enters
    the muscle at its posterior border.
