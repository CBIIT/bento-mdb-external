  origin_version: '1'
  value: neck of rib
  definition: The neck of the rib is the flattened portion which extends lateralward
    from the head; it is about 2.5 cm. long, and is placed in front of the transverse
    process of the lower of the two vertebrC& with which the head articulates. Its
    anterior surface is flat and smooth, its posterior rough for the attachment of
    the ligament of the neck, and perforated by numerous foramina. Of its two borders
    the superior presents a rough crest (crista colli costE) for the attachment of
    the anterior costotransverse ligament; its inferior border is rounded. On the
    posterior surface at the junction of the neck and body, and nearer the lower than
    the upper border, is an eminencebthe tubercle; it consists of an articular and
    a non-articular portion. The articular portion, the lower and more medial of the
    two, presents a small, oval surface for articulation with the end of the transverse
    process of the lower of the two vertebrC& to which the head is connected. The
    non-articular portion is a rough elevation, and affords attachment to the ligament
    of the tubercle. The tubercle is much more prominent in the upper than in the
    lower ribs.
  external_references: SCTID:263359009|Wikipedia:Neck_of_rib|FMA:7576|EMAPA:37826
