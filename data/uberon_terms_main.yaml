- origin_name: UBERON
  origin_id: 0007818
  origin_version: '1'
  value: major alar cartilage
  definition: The greater alar cartilage (lower lateral cartilage) is a thin, flexible
    plate, situated immediately below the preceding, and bent upon itself in such
    a manner as to form the medial wall and lateral wall of the naris of its own side.
    The portion which forms the medial wall (crus mediale) is loosely connected with
    the corresponding portion of the opposite cartilage, the two forming, together
    with the thickened integument and subjacent tissue, the septum mobile nasi. The
    part which forms the lateral wall (crus laterale) is curved to correspond with
    the ala of the nose; it is oval and flattened, narrow behind, where it is connected
    with the frontal process of the maxilla by a tough fibrous membrane, in which
    are found three or four small cartilaginous plates, the lesser alar cartilages
    (cartilagines alares minores; sesamoid cartilages). Above, it is connected by
    fibrous tissue to the lateral cartilage and front part of the cartilage of the
    septum; below, it falls short of the margin of the naris, the ala being completed
    by fatty and fibrous tissue covered by skin. In front, the greater alar cartilages
    are separated by a notch which corresponds with the apex of the nose.
  external_references: Wikipedia:Greater_alar_cartilage|SCTID:361928006|FMA:59504
- origin_name: UBERON
  origin_id: 0001907
  origin_version: '1'
  value: zona incerta
  definition: The zona incerta is a horizontally elongated region of gray matter cells
    in the subthalamus below the thalamus. Its connections project extensively over
    the brain from the cerebral cortex down into the spinal cord. Its function is
    unknown though several have been proposed related to 'limbic-motor integration'
    such as controlling visceral activity and pain; gating sensory input and synchronizing
    cortical and subcortical brain rhythms. Its dysfunction may play a role in central
    pain syndrome. It is also been identified as a promising deep brain stimulation
    therapy target for treating Parkinsons Disease. Its existence was first described
    by Auguste Forel in 1877 as a 'region of which nothing certain can be said'. A
    hundred and thirty years later in 2007, Nadia Urbain and Martin Deschênes of Université
    Laval noted that the 'zona incerta is among the least studied regions of the brain;
    its name does not even appear in the index of many textbooks. ' [WP,unvetted].
  external_references: BTO:0003146|MBA:797|MESH:D065820|MA:0000878|SCTID:369186007|HBA:4507|BM:Die-VTh-ZI|EMAPA:35930|DHBA:10463|FMA:62038|BAMS:ZI|Wikipedia:Zona_incerta|neuronames:438
