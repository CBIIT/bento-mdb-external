    membrane; with the epiglottis by three folds (glossoepiglottic) of mucous membrane;
    with the soft palate by the glossopalatine arches; and with the pharynx by the
    Constrictores pharyngis superiores and the mucous membrane. It is derived primarily
    from the third pharyngeal arch. (The second arch has a substantial contribution
    during fetal development, but this later atrophies. The fourth arch may also contribute,
    depending upon how the boundaries of the tongue are defined.).
