  value: irregular bone
  definition: 'The irregular bones are bones which, from their peculiar form, cannot
    be grouped as long bone, short bone, flat bone or sesamoid bone. Irregular bones
    serve various purposes in the body, such as protection of nervous tissue, affording
    multiple anchor points for skeletal muscle attachment (as with the sacrum), and
    maintaining pharynx and trachea support, and tongue attachment (such as the hyoid
    bone). They consist of cancellous tissue enclosed within a thin layer of compact
    bone. The irregular bones are: the vertebrC&, sacrum, coccyx, temporal, sphenoid,
    ethmoid, zygomatic, maxilla, mandible, palatine, inferior nasal concha, and hyoid.'
