    that supplies blood to the cerebrum. The MCA arises from the internal carotid
    and continues into the lateral sulcus where it then branches and projects to many
    parts of the lateral cerebral cortex. It also supplies blood to the anterior temporal
    lobes and the insular cortices. The left and right MCAs rise from trifurcations
