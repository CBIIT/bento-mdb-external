- origin_name: UBERON
  origin_id: 0009675
  origin_version: '1'
  value: chorda tympani branch of facial nerve
  definition: The chorda tympani is a nerve that branches from the facial nerve (cranial
    nerve VII) inside the facial canal, just before the facial nerve exits the skull
    via the stylomastoid foramen. Chorda tympani is a branch of the facial nerve (the
    seventh cranial nerve) that serves the taste buds in the front of the tongue,
    runs through the middle ear, and carries taste messages to the brain. The chorda
    tympani is part of one of three cranial nerves that are involved in taste. The
    taste system involves a complicated feedback loop, with each nerve acting to inhibit
    the signals of other nerves. The chorda tympani appears to exert a particularly
    strong inhibitory influence on other taste nerves, as well as on pain fibers in
    the tongue. When the chorda tympani is damaged, its inhibitory function is disrupted,
    leading to less inhibited activity in the other nerves.
  external_references: EMAPA:18217|EHDAA:3719|VHOG:0001343|Wikipedia:Chorda_tympani|MA:0001092|FMA:53228|neuronames:1434|EHDAA2:0000490|SCTID:280274004
