- origin_name: UBERON
  origin_id: '0001104'
  origin_version: '1'
  value: anterior jugular vein
  definition: The anterior jugular vein begins near the hyoid bone by the confluence
    of several superficial veins from the submaxillary region. It descends between
    the median line and the anterior border of the Sternocleidomastoideus, and, at
    the lower part of the neck, passes beneath that muscle to open into the termination
    of the external jugular, or, in some instances, into the subclavian vein. It varies
    considerably in size, bearing usually an inverse proportion to the external jugular;
    most frequently there are two anterior jugulars, a right and left; but sometimes
    only one. Its tributaries are some laryngeal veins, and occasionally a small thyroid
    vein. Just above the sternum the two anterior jugular veins communicate by a transverse
    trunk, the venous jugular arch, which receive tributaries from the inferior thyroid
    veins; each also communicates with the internal jugular. There are no valves in
    this vein. [WP,unvetted].
  external_references: SCTID:65478008|UMLS:C0226545|Wikipedia:Anterior_jugular_vein|EMAPA:37134|NCIT:C32094|MA:0002155|FMA:13318
