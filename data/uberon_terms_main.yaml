- origin_name: UBERON
  origin_id: 0006681
  origin_version: '1'
  value: interthalamic adhesion
  definition: The medial surface of the thalamus constitutes the upper part of the
    lateral wall of the third ventricle, and is connected to the corresponding surface
    of the opposite thalamus by a flattened gray band, the Interthalamic adhesion
    (massa intermedia, middle commissure, gray commissure). In non-human mammals it
    is a large structure. In humans this mass averages about 1 cm in length in its
    antero-posterior diameter. It sometimes consists of two parts and occasionally
    is absent. The interthalamic adhesion is found in 70-80% of humans. It is present
    more often in females and larger than in males by an average of 53 percent. When
    absent in development, no noticeable deficit has been observed. It contains nerve
    cells and nerve fibers; a few of the latter may cross the middle line, but most
    of them pass toward the middle line and then curve lateralward on the same side.
  external_references: EMAPA:18546|BAMS:InTrM|FMA:74869|BAMS:itha|Wikipedia:Interthalamic_adhesion|neuronames:301
