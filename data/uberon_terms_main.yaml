- origin_name: UBERON
  origin_id: '0002773'
  origin_version: '1'
  value: anterior transverse temporal gyrus
  definition: The transverse temporal gyri (also called Heschl's gyri or Heschl's
    convolutions) are found in the area of primary auditory cortex in the superior
    temporal gyrus of the human brain, occupying Brodmann areas 41 and 42. It is the
    first cortical structure to process incoming auditory information. Anatomically,
    the transverse temporal gyri are distinct in that they run mediolaterally (towards
    the center of the brain) rather than dorsiventrally (front to back) as all other
    temporal lobe gyri run. The Heschl's gyri are named after Richard L. Heschl.
  external_references: BAMS:ATTG|FMA:71029|UMLS:C0262198|HBA:4165|neuronames:134|SCTID:279192003|BIRNLEX:1657|FMA:61909|Wikipedia:Transverse_temporal_gyrus
