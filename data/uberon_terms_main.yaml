- origin_name: UBERON
  origin_id: '0013550'
  origin_version: '1'
  value: Brodmann (1909) area 19
  definition: Brodmann area 19, or BA19, is part of the occipital lobe cortex in the
    human brain. Along with area 18, it comprises the extrastriate (or peristriate)
    cortex. In normally-sighted humans, extrastriate cortex is a visual association
    area, with feature-extracting, shape recognition, attentional, and multimodal
    integrating functions. This area is also known as peristriate area 19, and it
    refers to a subdivision of the cytoarchitecturally defined occipital region of
    cerebral cortex. In the human it is located in parts of the lingual gyrus, the
    cuneus, the lateral occipital gyrus (H) and the superior occipital gyrus (H) of
    the occipital lobe where it is bounded approximately by the parieto-occipital
    sulcus. Cytoarchitecturally it is bounded on one side by the parastriate area
    18 which it surrounds. Rostrally it is bounded by the angular area 39 (H) and
    the occipitotemporal area 37 (H) (Brodmann-1909).
