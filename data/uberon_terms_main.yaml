  value: tegmentum
  definition: The ventral topographic division of the midbrain; the dorsal topographic
    division is the tectum. Meckel (1817; see English translation, 1832, vol. 2, p.
    467) apparently introduced the term and roughly its definition here for macrodissected
    adult humans, except he excluded the cerebral peduncle (Tarin, 1753), a white
    matter tract at the base of the midbrain, which is still common today but is included
