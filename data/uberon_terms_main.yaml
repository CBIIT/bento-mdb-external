  definition: The efferent ducts (or efferent ductules or ductuli efferentes) connect
    the rete testis with the initial section of the epididymis. The ductuli are unilaminar
    and composed of columnar ciliated and non-ciliated (absorptive) cells. The ciliated
    cells serve to stir the luminal fluids, possibly to help ensure homogeneous absorption
    of water from the fluid produced by the testis, which results in an increase in
    the concentration of luminal sperm. The epithelium is surrounded by a band of
    smooth muscle that helps to propel the sperm toward the epididymis.
  external_references: Wikipedia:Efferent_ducts|NCIT:C32492|MA:0000398|EMAPA:18993|UMLS:C0228013|FMA:19081|AAO:0010532
