- origin_name: UBERON
  origin_id: 0005821
  origin_version: '1'
  value: gracile fasciculus
  definition: A group of axons that are from neurons involved in proprioception from
    the lower trunk and lower limb[GO]. The fasciculus gracilis (tract of Goll) is
    a bundle of axon fibres in the dorsomedial spinal cord that carries information
    about fine touch, vibrations, and conscious proprioception from the lower part
    of the body to the brain stem. It is part of the posterior column of the spinal
    cord, which also contains the fasciculus cuneatus, which carries the same information
    from the upper part of the body. This tract and its continuation in the brain
    stem is often referred to as the posterior column-medial lemniscus pathway. The
    fasciculus gracilis is wedge-shaped on transverse section and lies next the posterior
    median septum, its base being at the surface of the medulla spinalis, and its
    apex directed toward the posterior gray commissure. It increases in size from
    below upward, and consists of long thin fibers that are derived from the posterior
    nerve roots, and ascend as far as the medulla oblongata, where they end in the
    nucleus gracilis. The tract of Goll was named after Swiss neuroanatomist Friedrich
    Goll[WP].
  external_references: BM:Me-GF|BAMS:grf|DHBA:12739|NCIT:C33799|BAMS:gr|FMA:258416|SCTID:369079001|neuronames:2440|HBA:265505586|MBA:388|UMLS:C0228522|Wikipedia:Gracile_fasciculus
