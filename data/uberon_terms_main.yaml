  value: paradidymis
  definition: A small collection of convoluted tubules, situated in front of the lower
    part of the cord above the head of the epididymis. These tubes are lined with
    columnar ciliated epithelium, and probably represent the remains of a part of
    the Wolffian body but are functionless and vestigial. The Wolffian body operates
    as a kidney (metanephros) in fishes and amphibians, but the corresponding tissue
    is co-opted to form parts of the male reproductive system in other classes of
    vertebrate. The paradidymis represents a remnant of an unused, atrophied part
    of the Wolffian body[WP,modified].
  external_references: Wikipedia:Paradidymis|SCTID:279643005|FMA:74055
- origin_name: UBERON
  origin_id: 0001592
  origin_version: '1'
  value: bronchial vein
  definition: The bronchial veins are small vessels that return blood from the larger
    bronchi and structures at the roots of the lungs. The right side drains into the
    azygos vein, while the left side drains into the left superior intercostal vein
    or the accessory hemiazygos vein. The bronchial veins are counterparts to the
    bronchial arteries. The veins, however, do not return all of the blood supplied
    by the arteries; much of the blood that is carried in the bronchial arteries is
    returned to the heart via the pulmonary veins. [WP,unvetted].
  external_references: UMLS:C0226650|EMAPA:36284|MA:0002088|Wikipedia:Bronchial_veins|NCIT:C53031|FMA:4749|SCTID:198293000
