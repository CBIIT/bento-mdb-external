- origin_name: UBERON
  origin_id: 0002961
  origin_version: '1'
  value: archicortex
  definition: A portion of the cerebral cortex that, with the paleocortex, develops
    in association with the olfactory system, and which is phylogenetically older
    than the neocortex and lacks its layered structure. The embryonic archicortex
    corresponds to the cortex of the dentate gyrus and hippocampus in mature mammals.
    Being part of the limbic system, it has functions related to emotions and formation
    of memory. Signals being sent from the limbic lobe to the hippocampal formations
    can go via the archicortex as an intermediate.
  external_references: EHDAA2:0004496|neuronames:170|DHBA:10293|Wikipedia:Archicortex|FMA:62424|BIRNLEX:787|BAMS:ACx|SCTID:423918008
