- origin_name: UBERON
  origin_id: '0003061'
  origin_version: '1'
  value: blood island
  definition: Blood islands are structures in the developing embryo which lead to
    many different parts of the circulatory system. They primarily derive from plexuses
    formed from angioblasts. Within them, vacuoles appear through liquefaction of
    the central part of the syncytium into plasma. The lumen of the blood vessels
    thus formed is probably intracellular. The flattened cells at the periphery form
    the endothelium. The nucleated red blood corpuscles develop either from small
    masses of the original angioblast left attached to the inner wall of the lumen
    or directly from the flat endothelial cells. In either case the syncytial mass
    thus formed projects from and is attached to the wall of the vessel. Such a mass
    is known as a blood island and hemoglobin gradually accumulates within it. Later
    the cells on the surface round up, giving the mass a mulberry-like appearance.
    Then the red blood cells break loose and are carried away in the plasma. Such
    free blood cells continue to divide. Blood islands have been seen in the area
    vasculosa in the omphalomesenteric vein and arteries, and in the dorsal aorta[WP,
    unvetted].
  external_references: TAO:0000094|TE:E5.11.2.0.0.0.4|VHOG:0000085|Wikipedia:Blood_island_of_umbilical_vesicle|AAO:0011006|EFO:0003489|XAO:0000067|EHDAA:207|NCIT:C34113|ZFA:0000094|UMLS:C1511224
