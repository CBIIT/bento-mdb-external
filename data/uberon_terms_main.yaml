- origin_name: UBERON
  origin_id: '0006654'
  origin_version: '1'
  value: perineal body
  definition: The perineal body (or central tendon of perineum) is a pyramidal fibromuscular
    mass in the middle line of the perineum at the junction between the urogenital
    triangle and the anal triangle. It is found in both males and females. In males,
    it is found between the bulb of penis and the anus; in females, is found between
    the vagina and anus, and about 1.25 cm in front of the latter. The perineal body
    is essential for the integrity of the pelvic floor, particularly in females. Its
    rupture during delivery leads to widening of the gap between the anterior free
    borders of levator ani muscle of both sides, thus predisposing the woman to prolapse
    of the uterus, rectum, or even the urinary bladder.
  external_references: EMAPA:17892|SCTID:367754000|FMA:20274|Wikipedia:Perineal_body
