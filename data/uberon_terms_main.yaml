  value: puborectalis muscle
  definition: The fibers which form a sling for the rectum are named the Puborectalis
    or Sphincter recti. They arise from the lower part of the symphysis pubis, and
    from the superior fascia of the urogenital diaphragm. They meet with the corresponding
