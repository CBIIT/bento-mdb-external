  definition: A placenta in which the chorionic villi have aggregated to form a broad
    band that circles about the center of the chorion. Such zones may be complete
    circles (such as those in dogs and cats) or incomplete (such as those in bears
    and seals). It is thought that zonary placentae form from diffuse placentae in
    which the villi at the ends regress, leaving only those in the center to function.
