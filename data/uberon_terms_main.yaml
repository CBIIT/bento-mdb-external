    and capitis. It arises by a series of tendons from the tips of the transverse
    processes of the upper six or seven thoracic and the seventh cervical vertebræ,
    and from the articular processes of the three cervical above this. The tendons,
    uniting, form a broad muscle, which passes upward, and is inserted between the
    superior and inferior nuchal lines of the occipital bone. The medial part, usually
    more or less distinct from the remainder of the muscle, is frequently termed the
    Spinalis capitis; it is also named the Biventer cervicis since it is traversed
    by an imperfect tendinous inscription. [WP,unvetted].
