- origin_name: UBERON
  origin_id: '0006564'
  origin_version: '1'
  value: superficial palmar arch
  definition: 'The superficial palmar arch is formed predominantly by the ulnar artery,
    with a contribution from the superficial palmar branch of the radial artery. However,
    in some individuals the contribution from the radial artery might be absent, and
    instead anastomoses with either the princeps pollicis artery, the radialis indicis
    artery, or the median artery, the former two of which are branches from the radial
    artery. Alternative names for this arterial arch are: superficial volar arch,
    superficial ulnar arch, arcus palmaris superficialis, or arcus volaris superficialis.
    The arch passes across the palm in a curve with its convexity downward. If one
    were to fully extend the thumb, the superficial palmar arch would lie approximately
    at the level of a line drawn from the distal border of the thumb across the palm.
    The superficial palmar arch is more distal than the deep palmar arch. Three common
    palmar digital arteries arise from the arch, proceeding down on the second, third,
    and fourth lumbrical muscles, respectively. They each receive a contribution from
    a palmar metacarpal artery. Near the level of the metacarpophalangeal joints,
    each common palmar digital artery divides into two proper palmar digital arteries.'
  external_references: MA:0002127|NCIT:C33665|FMA:22834|Wikipedia:Superficial_palmar_arch|SCTID:362051006|UMLS:C0226433|EMAPA:37755
