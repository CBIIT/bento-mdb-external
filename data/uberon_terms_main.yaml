  origin_version: '1'
  value: submandibular lymph node
  definition: The submandibular lymph nodes (submaxillary glands in older texts),
    three to six in number, are placed beneath the body of the mandible in the submaxillary
    triangle, and rest on the superficial surface of the submaxillary salivary gland.
    One gland, the middle gland of Stahr, which lies on the external maxillary artery
    as it turns over the mandible, is the most constant of the series; small lymph
    glands are sometimes found on the deep surface of the submaxillary salivary glands.
    The afferents of the submaxillary glands drain the medial palpebral commissure,
    the cheek, the side of the nose, the upper lip, the lateral part of the lower
    lip, the gums, and the anterior part of the margin of the tongue. Efferent vessels
    from the facial and submental glands also enter the submaxillary glands. Their
    efferent vessels pass to the superior deep cervical glands. [WP,unvetted].
