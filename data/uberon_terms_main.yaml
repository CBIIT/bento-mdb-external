- origin_name: UBERON
  origin_id: 0015219
  origin_version: '1'
  value: middle nasal meatus
  definition: The middle meatus is a nasal opening or canal situated between the middle
    and inferior conchae, and extends from the anterior to the posterior end of the
    latter. The lateral wall of this meatus can be satisfactorily studied only after
    the removal of the middle concha. On it is a curved fissure, the hiatus semilunaris,
    limited below by the edge of the uncinate process of the ethmoid and above by
    an elevation named the bulla ethmoidalis; the middle ethmoidal cells are contained
    within this bulla and open on or near to it. Through the hiatus semilunaris the
    meatus communicates with a curved passage termed the infundibulum, which communicates
    in front with the anterior ethmoidal cells and in rather more than fifty percent
    of skulls is continued upward as the frontonasal duct into the frontal air-sinus;
    when this continuity fails, the frontonasal duct opens directly into the anterior
    part of the meatus. Below the bulla ethmoidalis and hidden by the uncinate process
    of the ethmoid is the opening of the maxillary sinus (ostium maxillare); an accessory
    opening is frequently present above the posterior part of the inferior nasal concha.
  external_references: EMAPA:19277|SCTID:361925009|Wikipedia:Middle_nasal_meatus|FMA:53139
