    the longest of the three borders, and extends from the medial to the inferior
    angle. It is arched, intermediate in thickness between the superior and the axillary
    borders, and the portion of it above the spine forms an obtuse angle with the
    part below. This border presents an anterior and a posterior lip, and an intermediate
    narrow area. The anterior lip affords attachment to the Serratus anterior; the
    posterior lip, to the Supraspinatus above the spine, the Infraspinatus below;
    the area between the two lips, to the Levator scapulC& above the triangular surface
    at the commencement of the spine, to the Rhomboideus minor on the edge of that
    surface, and to the Rhomboideus major below it; this last is attached by means
    of a fibrous arch, connected above to the lower part of the triangular surface
    at the base of the spine, and below to the lower part of the border.
