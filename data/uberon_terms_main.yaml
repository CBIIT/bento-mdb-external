  value: Brodmann (1909) area 25
  definition: Brodmann area 25 (BA25) is an area in the cerebral cortex of the brain
    and delineated based on its cytoarchitectonic characteristics. It is also called
    the subgenual area or area subgenualis. It is the 25th 'Brodmann area' defined
