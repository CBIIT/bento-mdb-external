- origin_name: UBERON
  origin_id: 0005974
  origin_version: '1'
  value: posterior cerebellomedullary cistern
  definition: A space between the cerebellum and the dorsal surface of the medulla[MP].
    The cisterna magna (or cerebellomedullary cistern) is one of three principal openings
    in the subarachnoid space between the arachnoid and pia mater layers of the meninges
    surrounding the brain. The openings are collectively referred to as cisterns.
    The cisterna magna is located between the cerebellum and the dorsal surface of
    the medulla oblongata. Cerebrospinal fluid produced in the fourth ventricle drains
    into the cisterna magna via the lateral apertures and median aperture. The two
    other principal cisterns are the pontine cistern located between the pons and
    the medulla, and the interpeduncular cistern located between the cerebral peduncles.
    Cerebral spinal fluid can also be obtained by puncture of the cisterna magna (cistern
    puncture).
  external_references: NCIT:C32324|MESH:D002946|Wikipedia:Cisterna_magna|neuronames:542|SCTID:280391002|FMA:83721|EMAPA:37816|UMLS:C0008841|GAID:690
