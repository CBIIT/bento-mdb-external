  value: zygomaticotemporal nerve
  definition: The zygomaticotemporal nerve or zygomaticotemporal branch (temporal
    branch) is derived from the maxillary branch of the trigeminal nerve (Cranial
    nerve V). It runs along the lateral wall of the orbit in a groove in the zygomatic
    bone, receives a branch of communication from the lacrimal, and passes through
    zygomaticotemporal foramen in the zygomatic bone to enter the temporal fossa.
    It ascends between the bone, and substance of the Temporalis muscle, pierces the
    temporal fascia about 2.5 cm. above the zygomatic arch, and is distributed to
    the skin of the side of the forehead, and communicates with the facial nerve and
    with the auriculotemporal branch of the mandibular nerve. As it pierces the temporal
    fascia, it gives off a slender twig, which runs between the two layers of the
    fascia to the lateral angle of the orbit.
