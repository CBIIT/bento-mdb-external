  origin_version: '1'
  value: falciform ligament
  definition: A ligament that attaches the liver to the anterior body wall. It is
    a broad and thin antero-posterior peritoneal fold, falciform in shape, its base
    being directed downward and backward and its apex upward and backward. It is a
    remnant of the ventral mesentery of the fetus. It is situated in an antero-posterior
    plane but lies obliquely, so that one surface faces forward and is in contact
    with the peritoneum behind the right rectus and the diaphragm, while the other
    is directed backward and is in contact with the left lobe of the liver. It is
    attached by its left margin to the under surface of the diaphragm and the posterior
    surface of the sheath of the right Rectus as low down as the umbilicus; by its
    right margin it extends from the notch on the anterior margin of the liver, as
    far back as the posterior surface. It is composed of two layers of peritoneum
    closely united together. Its base or free edge contains between its layers the
    round ligament and the paraumbilical veins[WP].
  external_references: VHOG:0000355|SCTID:362705001|MA:0001622|EHDAA2:0000499|Wikipedia:Falciform_ligament|UMLS:C0230240|NCIT:C32582|EHDAA:4856|EMAPA:18288|FMA:15823
