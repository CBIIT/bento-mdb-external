- origin_name: UBERON
  origin_id: '0001654'
  origin_version: '1'
  value: supraorbital vein
  definition: The supraorbital vein begins on the forehead where it communicates with
    the frontal branch of the superficial temporal vein. It runs downward superficial
    to the Frontalis muscle, and joins the frontal vein at the medial angle of the
    orbit to form the angular vein. Previous to its junction with the frontal vein,
    it sends through the supraorbital notch into the orbit a branch which communicates
    with the ophthalmic vein; as this vessel passes through the notch, it receives
    the frontal diploic vein through a foramen at the bottom of the notch. The areas
    drained by this vessel are the forehead, eyebrow and upper eyelid. [WP,unvetted].
