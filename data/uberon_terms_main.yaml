- origin_name: UBERON
  origin_id: '0001330'
  origin_version: '1'
  value: pampiniform plexus
  definition: The pampiniform plexus is a network of many small veins found in the
    male spermatic cord. It is formed by the union of multiple spermatic veins from
    the back of the testis and tributaries from the epididymis. The veins of the plexus
    ascend along the cord in front of the ductus deferens. Below the subcutaneous
    inguinal ring they unite to form three or four veins, which pass along the inguinal
    canal, and, entering the abdomen through the abdominal inguinal ring, coalesce
    to form two veins. These again unite to form a single vein, the testicular vein,
    which opens on the right side into the inferior vena cava, at an acute angle,
    and on the left side into the left renal vein, at a right angle. The pampinoform
    plexus forms the chief mass of the cord. In addition to its function in venous
    return from the testes, the pampiniform plexus also plays a role in the temperature
    regulation of the testes. It acts as a heat exchanger, cooling blood in adjacent
    arteries. An abnormal enlargement of the pampiniform plexus is a medical condition
    called varicocele. [WP,unvetted].
  external_references: EMAPA:37385|FMA:19607|SCTID:279661001|Wikipedia:Pampiniform_venous_plexus|MA:0001866
