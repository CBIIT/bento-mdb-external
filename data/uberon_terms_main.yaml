  origin_version: '1'
  value: Brodmann (1909) area 32
  definition: The Brodmann area 32, also known in the human brain as the dorsal anterior
    cingulate area 32, refers to a subdivision of the cytoarchitecturally defined
    cingulate region of cerebral cortex. In the human it forms an outer arc around
    the anterior cingulate gyrus. The cingulate sulcus defines approximately its inner
    boundary and the superior rostral sulcus (H) its ventral boundary; rostrally it
    extends almost to the margin of the frontal lobe. Cytoarchitecturally it is bounded
    internally by the ventral anterior cingulate area 24, externally by medial margins
    of the agranular frontal area 6, intermediate frontal area 8, granular frontal
    area 9, frontopolar area 10, and prefrontal area 11-1909. (Brodmann19-09). Dorsal
    region of anterior cingulate gyrus is associated with rational thought processes,
    most notably active during the Stroop task.
