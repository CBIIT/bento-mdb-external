  origin_version: '1'
  value: common iliac artery
  definition: The common iliac arteries are two large arteries, about 4cm long in
    adults but more than a centimetre in diameter, that originate from the aortic
    bifurcation. The arteries run inferolaterally, along the medial border of the
    psoas muscles to the pelvic brim, where they bifurcate into the external iliac
    artery and internal iliac artery. The common iliac artery, and all of its branches,
    exist as paired structures (that is to say, there is one on the left side and
    one on the right). The distribution of the common iliac artery is basically the
    pelvis and lower limb on the corresponding side. Both common iliac arteries are
    accompanied along their course by common iliac veins. [WP,unvetted].
  external_references: UMLS:C1261084|FMA:14764|Wikipedia:Common_iliac_artery|EHDAA2:0000311|NCIT:C32357|SCTID:362050007|EMAPA:17310|MA:0001972|EHDAA:2553
