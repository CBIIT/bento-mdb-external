  origin_version: '1'
  value: acetabular part of hip bone
  definition: The acetabulum is a concave surface of the pelvis. The head of the femur
    meets with the pelvis at the acetabulum, forming the hip joint. There are three
    bones of the os coxae (hip bone) that come together to form the acetabulum. Contributing
    a little more than two-fifths of the structure is the ischium, which provides
    lower and side boundaries to the acetabulum. The ilium forms the upper boundary,
    providing a little less than two-fifths of the structure of the acetabulum. The
    rest is formed by the pubis, near the midline. It is bounded by a prominent uneven
    rim, which is thick and strong above, and serves for the attachment of the acetabular
    labrum, which reduces its opening, and deepens the surface for formation of the
    hip joint. At the lower part of the acetabulum is the acetabular notch, which
    is continuous with a circular depression, the acetabular fossa, at the bottom
    of the cavity of the acetabulum. The rest of the acetabulum is formed by a curved,
    crescent-moon shaped surface, the lunate surface, where the joint is made with
    the head of the femur. Its counterpart in the pectoral girdle is the glenoid fossa.[WP,unvetted].
  external_references: MA:0001335|EMAPA:18346|FMA:16579|VHOG:0000974|EHDAA:10661|NCIT:C32042|Wikipedia:Acetabulum|RETIRED_EHDAA2:0001427|MESH:D000077|GAID:206|UMLS:C0000962|SCTID:182027007|AAO:0000770
