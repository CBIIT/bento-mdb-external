- origin_name: UBERON
  origin_id: 0001858
  origin_version: '1'
  value: posterior semicircular duct
  definition: The semicircular canals are three half-circular, interconnected tubes
    located inside each ear. The three canals are the horizontal semicircular canal
    (also known as the lateral semicircular canal), superior semicircular canal (also
    known as the anterior semicircular canal), and the posterior semicircular canal.
    The canals are aligned approximately orthogonally to one another. The horizontal
    canal is aligned roughly horizontally in the head. The superior and anterior canals
    are aligned roughly at a 45 degree angle to a vertical plane drawn from the nose
    to the back of the skull. Thus, the horizontal canal detects horizontal head movements
    (such as when doing a pirouette), while the superior and posterior canals detect
    vertical head movements. Each canal is filled with a fluid called endolymph and
    contains a motion sensor with little hairs whose ends are embedded in a gelatinous
    structure called the cupula. As the skull twists in any direction, the endolymph
    is thrown into different sections of the canals. The cilia detect when the endolymph
    rushes past, and a signal is then sent to the brain. The semicircular canals are
    a component of the Labyrinth. Among species of mammals, the size of the semicircular
    canals is correlated with their type of locomotion. Specifically, species that
    are agile and have fast, jerky locomotion have larger canals relative to their
    body size than those that move more cautiously.
  external_references: FMA:61126|Wikipedia:Semicircular_canal|VHOG:0000248|EMAPA:37413|SCTID:279835002|MA:0001214
