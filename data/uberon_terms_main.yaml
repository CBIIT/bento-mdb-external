    matter located around the cerebral aqueduct within the midbrain. It plays a role
    in the descending modulation of pain and in defensive behaviour. The ascending
    pain and temperature fibers of the spinothalamic tract also send information to
    the PAG via the spinomesencephalic tract. The spinomesencephalic tract is so-named
    because the fibers originate in the spine and terminate in the mesencephalon,
    another name for the midbrain, the part of the brain in which the PAG resides.
    [WP,unvetted].
