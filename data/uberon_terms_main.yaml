  origin_version: '1'
  value: Brodmann (1909) area 10
  definition: Brodmann area 10, or BA10, is part of the frontal cortex in the human
    brain. BA10 encompasses the most anterior part of the frontal cortex, known as
    the frontopolar region. This area is believed to play a part in strategic processes
    involved in memory retrieval and executive function. This area is also called
    frontopolar area 10, and it refers to a subdivision of the cytoarchitecturally
    defined frontal region of cerebral cortex. It occupies the most rostral portions
    of the superior frontal gyrus and the middle frontal gyrus. In humans, on the
    medial aspect of the hemisphere it is bounded ventrally by the superior rostral
    sulcus (H). It does not extend as far as the cingulate sulcus. Cytoarchitecturally
    it is bounded dorsally by the granular frontal area 9, caudally by the middle
    frontal area 46, and ventrally by the orbital area 47 and by the rostral area
    12 or, in an early version of Brodmann's cortical map (Brodmann-1909), the prefrontal
    Brodmann area 11-1909.
  external_references: UMLS:C1272532|neuronames:76|BIRNLEX:1741|BAMS:ros|DHBA:146034836|FMA:68607|Wikipedia:Brodmann_area_10
