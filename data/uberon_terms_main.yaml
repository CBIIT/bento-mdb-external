  origin_version: '1'
  value: vastus lateralis
  definition: 'The Vastus lateralis (Vastus externus) is the largest part of the Quadriceps
    femoris. It arises by a broad aponeurosis, which is attached to the upper part
    of the intertrochanteric line, to the anterior and inferior borders of the greater
    trochanter, to the lateral lip of the gluteal tuberosity, and to the upper half
    of the lateral lip of the linea aspera; this aponeurosis covers the upper three-fourths
    of the muscle, and from its deep surface many fibers take origin. A few additional
    fibers arise from the tendon of the Glutæus maximus, and from the lateral intermuscular
    septum between the Vastus lateralis and short head of the Biceps femoris. The
    fibers form a large fleshy mass, which is attached to a strong aponeurosis, placed
    on the deep surface of the lower part of the muscle: this aponeurosis becomes
    contracted and thickened into a flat tendon inserted into the lateral border of
    the patella, blending with the Quadriceps femoris tendon, and giving an expansion
    to the capsule of the knee-joint. [WP,unvetted].'
  external_references: BTO:0001563|EFO:0001937|galen:VastusLateralis|FMA:22431|Wikipedia:Vastus_lateralis|EMAPA:36244|NCIT:C53073|MA:0002402|UMLS:C0224444
