  origin_version: '1'
  value: common hepatic duct
  definition: Predominantly extrahepatic bile duct which is formed by the junction
    of the right and left hepatic ducts, which are predominantly intrahepatic, and,
    in turn, joins the cystic duct to form the common bile duct[GAID]. The common
    hepatic duct is the duct formed by the convergence of the right hepatic duct (which
    drains bile from the right functional lobe of the liver) and the left hepatic
    duct (which drains bile from the left functional lobe of the liver). The common
    hepatic duct then joins the cystic duct coming from the gallbladder to form the
    common bile duct[WP].
