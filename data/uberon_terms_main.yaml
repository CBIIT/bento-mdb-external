- origin_name: UBERON
  origin_id: '0006472'
  origin_version: '1'
  value: Brodmann (1909) area 6
  definition: Brodmann area 6, or BA6, is part of the frontal cortex in the human
    brain. Situated just anterior to the primary motor cortex, it is composed of the
    premotor cortex and, medially, the supplementary motor area, or SMA. This large
    area of the frontal cortex is believed to play a role in the planning of complex,
    coordinated movements. Brodmann area 6 is also called agranular frontal area 6
    in humans because it lacks an internal granular cortical layer (layer IV). It
    is a subdivision of the cytoarchitecturally defined precentral region of cerebral
    cortex. In the human brain, it is located on the portions of the precentral gyrus
    that are not occupied by the gigantopyramidal area 4; furthermore, BA6 extends
    onto the caudal portions of the superior frontal and middle frontal gyri. It extends
    from the cingulate sulcus on the medial aspect of the hemisphere to the lateral
    sulcus on the lateral aspect. It is bounded rostrally by the granular frontal
    region and caudally by the gigantopyramidal area 4 (Brodmann, 1909).
  external_references: Wikipedia:Brodmann_area_6|SCTID:384765009|UMLS:C1272528|neuronames:1020|BIRNLEX:1737|FMA:68602
