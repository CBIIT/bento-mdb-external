  origin_version: '1'
  value: spinocerebellum
  definition: A phylogenetic subdivision of the cerebellum, the intermediate part,
    which regulates body and limb movements. It receives proprioception input from
    the dorsal columns of the spinal cord (including the spinocerebellar tract) and
    the trigeminal nerve, as well as from visual and auditory systems. It sends fibres
    to deep cerebellar nuclei which in turn project to both the cerebral cortex and
    the brain stem, thus providing modulation of descending motor systems.
  external_references: Wikipedia:Cerebellum
