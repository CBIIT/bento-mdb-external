  origin_version: '1'
  value: mesonephros
  definition: The second stage of the kidney. It serves as the main excretory organ
    of aquatic vertebrates and as a temporary embryonic kidney in higher vertebrates.
    It is composed of the mesonephric duct (also called the Wolffian duct), mesonephric
    tubules, and associated capillary tufts. A single tubule and its associated capillary
    tuft is called a mesonephric excretory unit; these units are similar in structure
    and function to nephrons of the adult kidney. The mesonephros is derived from
    intermediate mesoderm in the vertebrate embryo.
