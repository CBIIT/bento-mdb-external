    above than below. From its front and sides numerous imperfect septa (trabeculæ)
    are given off, which radiate toward the surface of the organ, and are attached
    to the tunica albuginea. They divide the interior of the organ into a number of
    incomplete spaces, called lobules. These are somewhat cone-shaped, being broad
