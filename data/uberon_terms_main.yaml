  origin_version: '1'
  value: claustrum of brain
  definition: One of the four basal ganglia in each cerebral hemisphere that consists
    of a thin lamina of gray matter between the lentiform nucleus and the insula[BTO].
    The claustrum, which is suspected to be present in all mammals, is a fairly thin
    (fraction of 1 mm to multiple mms) vertical curved sheet of subcortical gray matter
    oriented sagittally between the white matter tracts of the external capsule and
    extreme capsule. The claustrum is lateral to the putamen and medial to the insular
    cortex and is considered by some sources to be part of the basal ganglia. There
    are lateral and medial tracts connecting to many cortices and perhaps to the hippocampus,
    the amygdala, and the caudate nucleus (connections with subcortical centers are
    a matter of debate)[WP].
