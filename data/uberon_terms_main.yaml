  origin_version: '1'
  value: layer of superior colliculus
  definition: The microstructure of the optic tectum / superior colliculus varies
    across species. As a general rule, there is always a clear distinction between
    superficial layers, which receive input primarily from the visual system and show
    primarily visual responses, and deeper layers, which receive many types of input
    and project to numerous motor-related brain areas. The distinction between these
    two zones is so clear and consistent that some anatomists have suggested that
    they should be considered separate brain structures. In mammals, neuroanatomists
    conventionally identify seven layers[WP].
