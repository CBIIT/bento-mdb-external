- origin_name: UBERON
  origin_id: 0022268
  origin_version: '1'
  value: planum temporale
  definition: The planum temporale is the cortical area just posterior to the auditory
    cortex within the Sylvian fissure. It is a triangular region which forms the heart
    of Wernicke's area, one of the most important functional areas for language. The
    planum temporale shows a significant asymmetry. In 65% of all individuals the
    left planum temporale appears to be more developed, while the right planum temporale
    is more developed in only 10%. In some peoplebs brains, the planum temporale is
    more than five times larger on the left than on the right, making it the most
    asymmetrical structure in the brain. This greater size of the left planum temporale
    compared with the right is already present in the foetus, where it can be observed
    starting from the 31st week of gestation. This observation strengthens the hypothesis
    of a genetic predisposition for brain asymmetry.
  external_references: neuronames:2333|Wikipedia:Planum_temporale|HBA:4171|DHBA:12145
