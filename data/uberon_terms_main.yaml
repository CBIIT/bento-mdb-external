    central nucleus of the amygdala, lateral hypothalamic area, parvocellular reticular
    nucleus and the prelimbic, infralimbic, medial and lateral precentral cortices
    . All of these brain areas influence the main function of the raphe magnus. The
    main function of the magnus is mostly pain mediation; in fact it sends projections
    to the dorsal horn of the spinal cord to directly inhibit pain. The periaquiductal
    gray, the epicenter of analgesia, sends efferent connections to the nucleus raphe
    magnus in when it is stimulated by opiates (endogenous or otherwise). Electrical
    stimulation of the PAG produces analgesia, as well as administration of morphine
    to the PAG or n.r. magnus. The antinociceptic effects of electrical stimulation
    of the PAG can be blocked by administering naloxone, an opiate antagonist, to
    the n.r. magnus. All of this seems to indicate that the magnus is part of the
    endogenous opiate system, and acts to inhibit pain in the spinal cord. [WP,unvetted].
  external_references: Wikipedia:Nucleus_raphe_magnus|BAMS:RM|BIRNLEX:1363|FMA:72584|BAMS:RMg|UMLS:C0175515|DHBA:12642|HBA:9643|MBA:206|EFO:0002518|EMAPA:35720|MESH:D065846|MA:0001024|neuronames:739
